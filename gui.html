<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>JSON 转 Markdown 转换器</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
      background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
      min-height: 100vh;
      display: flex;
      flex-direction: column;
    }

    .header {
      background: rgba(0, 0, 0, 0.2);
      padding: 16px 24px;
      display: flex;
      justify-content: space-between;
      align-items: center;
      color: white;
    }

    .header h1 {
      font-size: 20px;
      font-weight: 600;
    }

    .toolbar {
      display: flex;
      gap: 12px;
    }

    .btn {
      padding: 8px 16px;
      border: none;
      border-radius: 8px;
      cursor: pointer;
      font-size: 14px;
      font-weight: 500;
      transition: all 0.2s;
    }

    .btn-primary {
      background: #4CAF50;
      color: white;
    }

    .btn-primary:hover {
      background: #45a049;
    }

    .btn-secondary {
      background: rgba(255, 255, 255, 0.2);
      color: white;
      border: 1px solid rgba(255, 255, 255, 0.3);
    }

    .btn-secondary:hover {
      background: rgba(255, 255, 255, 0.3);
    }

    .btn-warning {
      background: #ff9800;
      color: white;
    }

    .btn-warning:hover {
      background: #f57c00;
    }

    .main-content {
      flex: 1;
      display: flex;
      padding: 20px;
      gap: 20px;
      overflow: hidden;
    }

    .panel {
      flex: 1;
      display: flex;
      flex-direction: column;
      background: white;
      border-radius: 16px;
      box-shadow: 0 10px 40px rgba(0, 0, 0, 0.2);
      overflow: hidden;
    }

    .panel-header {
      padding: 12px 20px;
      background: #f5f5f5;
      border-bottom: 1px solid #eee;
      display: flex;
      justify-content: space-between;
      align-items: center;
    }

    .panel-header h2 {
      font-size: 14px;
      font-weight: 600;
      color: #333;
    }

    .panel-body {
      flex: 1;
      overflow: hidden;
      display: flex;
      flex-direction: column;
    }

    textarea {
      flex: 1;
      width: 100%;
      padding: 16px;
      border: none;
      resize: none;
      font-family: 'Consolas', 'Monaco', monospace;
      font-size: 14px;
      line-height: 1.6;
      background: #1e1e1e;
      color: #d4d4d4;
    }

    textarea:focus {
      outline: none;
    }

    textarea::placeholder {
      color: #666;
    }

    .output-area {
      flex: 1;
      padding: 16px;
      overflow-y: auto;
      font-family: 'Consolas', 'Monaco', monospace;
      font-size: 14px;
      line-height: 1.6;
      background: #fafafa;
      color: #333;
      white-space: pre-wrap;
      word-wrap: break-word;
    }

    .drop-zone {
      border: 2px dashed #ddd;
      border-radius: 8px;
      padding: 20px;
      text-align: center;
      color: #999;
      transition: all 0.3s;
      margin-bottom: 16px;
    }

    .drop-zone.dragover {
      border-color: #667eea;
      background: #f0f4ff;
      color: #667eea;
    }

    .status-bar {
      padding: 8px 16px;
      background: rgba(0, 0, 0, 0.1);
      font-size: 12px;
      color: white;
      display: flex;
      justify-content: space-between;
    }

    .template-select {
      padding: 6px 12px;
      border-radius: 6px;
      border: 1px solid rgba(255, 255, 255, 0.3);
      background: rgba(255, 255, 255, 0.1);
      color: white;
      font-size: 14px;
      cursor: pointer;
    }

    .template-select option {
      background: #333;
      color: white;
    }

    .toast {
      position: fixed;
      bottom: 40px;
      right: 20px;
      padding: 12px 24px;
      border-radius: 8px;
      color: white;
      font-size: 14px;
      opacity: 0;
      transform: translateY(20px);
      transition: all 0.3s;
      z-index: 1000;
    }

    .toast.show {
      opacity: 1;
      transform: translateY(0);
    }

    .toast.success {
      background: #4CAF50;
    }

    .toast.error {
      background: #f44336;
    }

    .checkbox-group {
      display: flex;
      gap: 16px;
      align-items: center;
    }

    .checkbox-group label {
      display: flex;
      align-items: center;
      gap: 6px;
      font-size: 12px;
      color: #666;
      cursor: pointer;
    }

    .checkbox-group input[type="checkbox"] {
      cursor: pointer;
    }
  </style>
</head>
<body>
  <div class="header">
    <h1>JSON 转 Markdown 转换器</h1>
    <div class="toolbar">
      <select class="template-select" id="formatSelect">
        <option value="auto">自动检测格式</option>
        <option value="general">通用 JSON</option>
        <option value="chat">聊天记录 messages[]</option>
        <option value="mapping">ChatGPT 导出 mapping</option>
        <option value="gemini">Gemini contents[]</option>
      </select>
      <button class="btn btn-secondary" id="copyBtn">复制</button>
      <button class="btn btn-warning" id="exportBtn">导出</button>
      <button class="btn btn-secondary" id="clearBtn">清空</button>
    </div>
  </div>

  <div class="main-content">
    <div class="panel">
      <div class="panel-header">
        <h2>JSON 输入</h2>
        <span style="font-size: 12px; color: #999;">拖拽 JSON 文件到此处或粘贴 JSON</span>
      </div>
      <div class="panel-body">
        <div class="drop-zone" id="dropZone">
          将 JSON 文件拖拽到此处
        </div>
        <textarea id="jsonInput" placeholder='{"name": "在此粘贴 JSON 数据"}'></textarea>
      </div>
    </div>

    <div class="panel">
      <div class="panel-header">
        <h2>Markdown 输出</h2>
        <div class="checkbox-group">
          <label><input type="checkbox" id="sortCheck"> 排序键名</label>
          <span id="charCount" style="font-size: 12px; color: #999;">0 字符</span>
        </div>
      </div>
      <div class="panel-body">
        <div class="output-area" id="outputArea"></div>
      </div>
    </div>
  </div>

  <div class="status-bar">
    <span id="status">就绪</span>
    <span id="conversionTime">0ms</span>
  </div>

  <div class="toast" id="toast"></div>

  <script>
    class JsonToMarkdownConverter {
      constructor(options = {}) {
        this.indent = options.indent || 2;
        this.sort = options.sort || false;
      }

      convert(jsonString) {
        let data;
        try {
          data = JSON.parse(jsonString);
        } catch (error) {
          throw new Error('无效的 JSON: ' + error.message);
        }
        return this.convertToMarkdown(data, 0);
      }

      convertChat(jsonString) {
        let data;
        try {
          data = JSON.parse(jsonString);
        } catch (error) {
          throw new Error('无效的 JSON: ' + error.message);
        }
        const messages = this.detectAndNormalizeChat(data);
        return this.renderChatToMarkdown(messages);
      }

      detectAndNormalizeChat(data) {
        if (Array.isArray(data)) {
          if (data.length > 0 && data[0].mapping) {
            const result = [];
            data.forEach((conv, idx) => {
              const title = conv.title || ('对话 ' + (idx + 1));
              if (data.length > 1) {
                result.push({ role: 'system', content: '---\n# ' + title + '\n---' });
              }
              result.push(...this.buildMessagesFromMapping(conv.mapping));
            });
            return result;
          }
          return data.map(m => this.normalizeMessage(m));
        }

        if (data.mapping) {
          return this.buildMessagesFromMapping(data.mapping, data.title);
        }

        if (data.messages && Array.isArray(data.messages)) {
          return data.messages.map(m => this.normalizeMessage(m));
        }

        if (data.contents && Array.isArray(data.contents)) {
          return data.contents.map(c => this.normalizeGeminiContent(c));
        }

        if (data.conversations && Array.isArray(data.conversations)) {
          const result = [];
          data.conversations.forEach((conv, i) => {
            const title = conv.title || conv.name || ('对话 ' + (i + 1));
            if (data.conversations.length > 1) {
              result.push({ role: 'system', content: '---\n# ' + title + '\n---' });
            }
            const msgs = conv.messages || conv.chats || conv.conversation || [];
            if (Array.isArray(msgs)) {
              result.push(...msgs.map(m => this.normalizeMessage(m)));
            }
          });
          return result;
        }

        return null;
      }

      buildMessagesFromMapping(mapping, title) {
        const messages = [];
        const nodeIds = Object.keys(mapping);
        const childrenMap = {};
        const parentMap = {};
        let rootId = null;

        nodeIds.forEach(id => {
          const node = mapping[id];
          const parent = node.parent || null;
          parentMap[id] = parent;
          if (!parent) {
            rootId = id;
          } else {
            if (!childrenMap[parent]) childrenMap[parent] = [];
            childrenMap[parent].push(id);
          }
        });

        if (!rootId && nodeIds.length > 0) {
          let candidate = nodeIds[0];
          for (let i = 0; i < nodeIds.length; i++) {
            const p = parentMap[candidate];
            if (!p) break;
            candidate = p;
          }
          rootId = candidate;
        }

        if (!rootId) return messages;

        const orderedIds = [];
        const walk = (id) => {
          (childrenMap[id] || []).forEach(childId => {
            orderedIds.push(childId);
            walk(childId);
          });
        };
        walk(rootId);

        orderedIds.forEach(id => {
          const node = mapping[id];
          const msg = node.message;
          if (!msg) return;

          if (msg.author && msg.author.role) {
            msg.role = msg.author.role;
          }

          const normalized = this.normalizeMessage(msg);
          if (msg.metadata && msg.metadata.model_slug) {
            normalized.content = '_模型: ' + msg.metadata.model_slug + '_\n\n' + normalized.content;
          }
          messages.push(normalized);
        });

        return messages;
      }

      normalizeMessage(msg) {
        const role = msg.role || 'unknown';
        let content = '';

        if (typeof msg.content === 'string') {
          content = msg.content;
        } else if (msg.content && typeof msg.content === 'object') {
          const parts = msg.content.parts;
          if (Array.isArray(parts)) {
            content = parts.filter(p => typeof p === 'string').join('\n');
          } else if (msg.content.content_type === 'text' && typeof msg.content.text === 'string') {
            content = msg.content.text;
          } else {
            content = JSON.stringify(msg.content, null, 2);
          }
        } else if (Array.isArray(msg.content)) {
          content = msg.content
            .filter(p => p.type === 'text')
            .map(p => p.text || '')
            .join('\n');
          if (msg.content.some(p => p.type === 'image_url' || p.type === 'image')) {
            content += '\n\n_[图片内容]_';
          }
        }

        const timestamp = msg.timestamp || msg.created_at || msg.created || msg.time || msg.create_time;
        const tool_calls = msg.tool_calls || (msg.content && msg.content.tool_calls);

        return {
          role: role,
          content: content || '',
          name: msg.name,
          timestamp: this.formatTimestamp(timestamp),
          tool_calls: tool_calls,
          tool_call_id: msg.tool_call_id
        };
      }

      formatTimestamp(ts) {
        if (!ts) return undefined;
        if (typeof ts === 'number') {
          try {
            const d = new Date(ts * 1000);
            return d.toISOString().replace('T', ' ').replace(/\.\d+Z/, '');
          } catch {
            return String(ts);
          }
        }
        return String(ts).replace('T', ' ').replace(/\.\d+Z/, '').replace(/\.\d+/, '');
      }

      normalizeGeminiContent(content) {
        const role = content.role === 'model' ? 'assistant' : (content.role || 'user');
        let text = '';
        if (content.parts && Array.isArray(content.parts)) {
          text = content.parts.filter(p => p.text !== undefined).map(p => p.text).join('\n');
          if (content.parts.some(p => p.inline_data)) {
            text += '\n\n_[附件内容]_';
          }
        }
        return { role: role, content: text };
      }

      renderChatToMarkdown(messages) {
        let result = '# 对话记录\n\n';
        let msgIndex = 0;

        messages.forEach(msg => {
          if (msg.role === 'system' && msg.content.startsWith('---\n# ')) {
            result += msg.content + '\n\n';
            return;
          }
          msgIndex++;
          const roleLabel = this.getRoleLabel(msg.role);
          const ts = msg.timestamp ? (' | ' + msg.timestamp) : '';
          result += '## ' + msgIndex + '. ' + roleLabel + ts + '\n\n';

          if (msg.content) {
            result += this.processContent(msg.content) + '\n\n';
          }

          if (msg.tool_calls && msg.tool_calls.length > 0) {
            result += '**工具调用:**\n\n';
            msg.tool_calls.forEach(tc => {
              const idStr = tc.id ? (' (ID: `' + tc.id + '`)' : '');
              result += '- **' + tc.function.name + '**' + idStr + '\n';
              try {
                const args = JSON.parse(tc.function.arguments);
                result += '  ```json\n  ' + JSON.stringify(args, null, 2).replace(/\n/g, '\n  ') + '\n  ```\n';
              } catch {
                result += '  ```\n  ' + tc.function.arguments + '\n  ```\n';
              }
            });
            result += '\n';
          }

          if (msg.tool_call_id) {
            result += '> 工具响应 `' + msg.tool_call_id + '`\n\n';
          }

          result += '---\n\n';
        });

        if (msgIndex === 0) {
          result += '_（无消息）_\n';
        }
        return result.trim();
      }

      getRoleLabel(role) {
        switch (role) {
          case 'user': return '用户';
          case 'assistant': return '助手';
          case 'system': return '系统';
          case 'tool': return '工具';
          case 'model': return '模型';
          default: return role.charAt(0).toUpperCase() + role.slice(1);
        }
      }

      processContent(content) {
        if (!content) return '';
        let result = content
          .replace(/\\n/g, '\n')
          .replace(/\\t/g, '\t')
          .replace(/\\"/g, '"')
          .replace(/\\'/g, "'");

        const hasCodeFence = result.startsWith('```') || result.endsWith('```') || result.includes('\n```') || result.includes('```\n');
        const hasCodeBlock = /```[\s\S]*```/.test(result);
        const hasTable = /\|.+\|/.test(result) && /\|[\s\-:]+\|/m.test(result);

        if (hasCodeFence || hasCodeBlock || hasTable) {
          return result;
        }

        const lines = result.split('\n');
        const hasLongLine = lines.some(line => line.length > 80);
        if (hasLongLine || lines.length > 5) {
          return '```\n' + result + '\n```';
        }
        return result;
      }

      convertToMarkdown(value, depth) {
        const indentStr = ' '.repeat(this.indent * depth);

        if (value === null) return 'null';
        if (value === undefined) return 'undefined';

        switch (typeof value) {
          case 'string':
            return this.convertString(value, depth);
          case 'number':
          case 'boolean':
            return String(value);
          case 'object':
            if (Array.isArray(value)) {
              return this.convertArray(value, depth);
            }
            return this.convertObject(value, depth);
          default:
            return String(value);
        }
      }

      convertString(value, depth) {
        if (this.isJsonString(value) || this.isCodeString(value)) {
          return '\n' + ' '.repeat(this.indent * depth) + '```json\n' + value + '\n' + ' '.repeat(this.indent * depth) + '```';
        }
        return value;
      }

      isJsonString(value) {
        try {
          const parsed = JSON.parse(value);
          return typeof parsed === 'object' && parsed !== null;
        } catch {
          return false;
        }
      }

      isCodeString(value) {
        const trimmed = value.trim();
        return /^(function|const|let|var|class|import|export)\s/.test(trimmed) ||
               /^[a-zA-Z_$][\w$]*\s*\(.*\)\s*\{/.test(trimmed);
      }

      convertArray(arr, depth) {
        if (arr.length === 0) return '[]';
        if (this.isTableData(arr)) return this.convertToTable(arr);

        const indentStr = ' '.repeat(this.indent * depth);
        let result = '\n';

        arr.forEach((item, index) => {
          const isObjectItem = typeof item === 'object' && item !== null && !Array.isArray(item);
          if (isObjectItem) {
            result += indentStr + '- **Item ' + (index + 1) + '**\n';
            Object.keys(item).forEach(key => {
              const val = this.convertToMarkdown(item[key], depth + 2);
              result += ' '.repeat(this.indent * (depth + 1)) + '- **' + key + '**: ' + val.trimStart() + '\n';
            });
          } else {
            result += indentStr + '- ' + this.convertToMarkdown(item, depth + 1) + '\n';
          }
        });
        return result;
      }

      isTableData(arr) {
        if (arr.length === 0) return false;
        if (!arr.every(item => typeof item === 'object' && item !== null && !Array.isArray(item))) {
          return false;
        }
        const allKeys = new Set();
        arr.forEach(item => Object.keys(item).forEach(k => allKeys.add(k)));
        return arr.every(item => {
          const itemKeys = Object.keys(item);
          return allKeys.size === itemKeys.length && [...allKeys].every(key => itemKeys.includes(key));
        });
      }

      convertToTable(arr) {
        if (arr.length === 0) return '[]';
        const allKeys = new Set();
        arr.forEach(item => Object.keys(item).forEach(k => allKeys.add(k)));
        const keys = [...allKeys];
        const header = '| ' + keys.join(' | ') + ' |';
        const separator = '| ' + keys.map(() => '---').join(' | ') + ' |';
        const rows = arr.map(item => {
          return '| ' + keys.map(key => {
            const value = item[key];
            if (value === null || value === undefined) return '';
            if (typeof value === 'object') return JSON.stringify(value).substring(0, 50);
            const cleaned = String(value).replace(/\n/g, ' ').replace(/\|/g, '\\|');
            return cleaned.length > 50 ? cleaned.substring(0, 50) + '...' : cleaned;
          }).join(' | ') + ' |';
        });
        return '\n' + header + '\n' + separator + '\n' + rows.join('\n') + '\n';
      }

      convertObject(obj, depth) {
        const keys = Object.keys(obj);
        if (this.sort) keys.sort();
        const indentStr = ' '.repeat(this.indent * depth);
        let result = '';

        keys.forEach((key, index) => {
          const value = obj[key];
          const isLast = index === keys.length - 1;
          const titleLevel = Math.min(depth + 1, 6);
          const title = '#'.repeat(titleLevel) + ' ' + key;

          if (index === 0) {
            result += indentStr + title + '\n';
          } else {
            result += '\n' + indentStr + title + '\n';
          }
          result += this.convertToMarkdown(value, depth + 1);
          if (!isLast && depth < 4) result += '\n';
        });
        return result;
      }
    }

    const jsonInput = document.getElementById('jsonInput');
    const outputArea = document.getElementById('outputArea');
    const dropZone = document.getElementById('dropZone');
    const copyBtn = document.getElementById('copyBtn');
    const exportBtn = document.getElementById('exportBtn');
    const clearBtn = document.getElementById('clearBtn');
    const sortCheck = document.getElementById('sortCheck');
    const formatSelect = document.getElementById('formatSelect');
    const status = document.getElementById('status');
    const charCount = document.getElementById('charCount');
    const conversionTime = document.getElementById('conversionTime');
    const toast = document.getElementById('toast');
    const STORAGE_KEY = 'json2md_input';

    function showToast(message, type = 'success') {
      toast.textContent = message;
      toast.className = 'toast ' + type + ' show';
      setTimeout(() => toast.classList.remove('show'), 3000);
    }

    function forceChatFormat(data, format) {
      switch (format) {
        case 'chat':
          if (data.messages && Array.isArray(data.messages)) return data;
          return { messages: Array.isArray(data) ? data : [data] };
        case 'mapping':
          if (data.mapping) return data;
          return { title: '对话', mapping: data.mapping || {} };
        case 'gemini':
          if (data.contents) return data;
          return { contents: Array.isArray(data) ? data : [{ role: 'user', parts: [{ text: JSON.stringify(data) }] }] };
        default:
          return data;
      }
    }

    function convertJson() {
      const jsonText = jsonInput.value.trim();
      localStorage.setItem(STORAGE_KEY, jsonInput.value);

      if (!jsonText) {
        outputArea.textContent = '';
        charCount.textContent = '0 字符';
        conversionTime.textContent = '0ms';
        status.textContent = '就绪';
        return;
      }

      status.textContent = '转换中...';
      const startTime = Date.now();

      try {
        const converter = new JsonToMarkdownConverter({ indent: 2, sort: sortCheck.checked });
        const format = formatSelect.value;
        const parsed = JSON.parse(jsonText);
        let result;

        if (format === 'general') {
          result = converter.convert(jsonText);
          status.textContent = '成功';
        } else {
          const data = format === 'auto' ? parsed : forceChatFormat(parsed, format);
          const chatMessages = converter.detectAndNormalizeChat(data);
          if (chatMessages) {
            result = converter.renderChatToMarkdown(chatMessages);
            status.textContent = '聊天格式 - ' + formatSelect.options[formatSelect.selectedIndex].text;
          } else {
            result = converter.convert(JSON.stringify(data, null, 2));
            status.textContent = '成功（未检测到聊天格式）';
          }
        }

        outputArea.textContent = result;
        charCount.textContent = result.length + ' 字符';
      } catch (error) {
        outputArea.textContent = '错误: ' + error.message;
        status.textContent = '错误';
        showToast('转换失败！', 'error');
      }

      conversionTime.textContent = (Date.now() - startTime) + 'ms';
    }

    jsonInput.addEventListener('input', convertJson);
    sortCheck.addEventListener('change', convertJson);
    formatSelect.addEventListener('change', convertJson);

    document.body.addEventListener('dragover', (e) => {
      e.preventDefault();
      dropZone.classList.add('dragover');
    });

    document.body.addEventListener('dragleave', (e) => {
      if (!e.relatedTarget || !document.body.contains(e.relatedTarget)) {
        dropZone.classList.remove('dragover');
      }
    });

    document.body.addEventListener('drop', (e) => {
      e.preventDefault();
      dropZone.classList.remove('dragover');
      const file = e.dataTransfer.files[0];
      if (file) {
        if (file.name.endsWith('.json')) {
          const reader = new FileReader();
          reader.onload = (event) => {
            jsonInput.value = event.target.result;
            convertJson();
            showToast('已加载 ' + file.name);
          };
          reader.readAsText(file);
        } else {
          showToast('请拖入 JSON 文件！', 'error');
        }
      }
    });

    copyBtn.addEventListener('click', async () => {
      const text = outputArea.textContent;
      if (!text) { showToast('没有内容可复制！', 'error'); return; }
      try {
        await navigator.clipboard.writeText(text);
        showToast('已复制到剪贴板！');
      } catch {
        showToast('复制失败！', 'error');
      }
    });

    exportBtn.addEventListener('click', () => {
      const text = outputArea.textContent;
      if (!text) { showToast('没有内容可导出！', 'error'); return; }
      const blob = new Blob([text], { type: 'text/markdown' });
      const url = URL.createObjectURL(blob);
      const a = document.createElement('a');
      a.href = url;
      a.download = 'output.md';
      document.body.appendChild(a);
      a.click();
      document.body.removeChild(a);
      URL.revokeObjectURL(url);
      showToast('导出成功！');
    });

    clearBtn.addEventListener('click', () => {
      jsonInput.value = '';
      outputArea.textContent = '';
      charCount.textContent = '0 字符';
      conversionTime.textContent = '0ms';
      status.textContent = '就绪';
      localStorage.removeItem(STORAGE_KEY);
      showToast('已清空！');
    });

    const saved = localStorage.getItem(STORAGE_KEY);
    if (saved) {
      jsonInput.value = saved;
    } else {
      jsonInput.value = JSON.stringify({
        "messages": [
          { "role": "user", "content": "你好" },
          { "role": "assistant", "content": "你好！有什么可以帮助你的？" }
        ]
      }, null, 2);
    }
    convertJson();
  </script>
</body>
</html>
