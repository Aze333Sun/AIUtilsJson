<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Json处理器</title>
  <script src="https://cdn.sheetjs.com/xlsx-0.20.3/package/dist/xlsx.full.min.js"></script>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
      background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
      min-height: 100vh;
      display: flex;
      flex-direction: column;
    }

    .header {
      background: rgba(0, 0, 0, 0.2);
      padding: 16px 24px;
      display: flex;
      justify-content: space-between;
      align-items: center;
      color: white;
    }

    .header h1 {
      font-size: 20px;
      font-weight: 600;
    }

    .toolbar {
      display: flex;
      gap: 12px;
    }

    .btn {
      padding: 8px 16px;
      border: none;
      border-radius: 8px;
      cursor: pointer;
      font-size: 14px;
      font-weight: 500;
      transition: all 0.2s;
    }

    .btn-primary {
      background: #4CAF50;
      color: white;
    }

    .btn-primary:hover {
      background: #45a049;
    }

    .btn-secondary {
      background: rgba(255, 255, 255, 0.2);
      color: white;
      border: 1px solid rgba(255, 255, 255, 0.3);
    }

    .btn-secondary:hover {
      background: rgba(255, 255, 255, 0.3);
    }

    .btn-warning {
      background: #ff9800;
      color: white;
    }

    .btn-warning:hover {
      background: #f57c00;
    }

    .main-content {
      flex: 1;
      display: flex;
      padding: 20px;
      gap: 20px;
      overflow: hidden;
    }

    .panel {
      flex: 1;
      display: flex;
      flex-direction: column;
      background: white;
      border-radius: 16px;
      box-shadow: 0 10px 40px rgba(0, 0, 0, 0.2);
      overflow: hidden;
    }

    .panel-header {
      padding: 12px 20px;
      background: #f5f5f5;
      border-bottom: 1px solid #eee;
      display: flex;
      justify-content: space-between;
      align-items: center;
    }

    .panel-header h2 {
      font-size: 14px;
      font-weight: 600;
      color: #333;
    }

    .panel-body {
      flex: 1;
      overflow: hidden;
      display: flex;
      flex-direction: column;
    }

    textarea {
      flex: 1;
      width: 100%;
      padding: 16px;
      border: none;
      resize: none;
      font-family: 'Consolas', 'Monaco', monospace;
      font-size: 14px;
      line-height: 1.6;
      background: #1e1e1e;
      color: #d4d4d4;
    }

    textarea:focus {
      outline: none;
    }

    textarea::placeholder {
      color: #666;
    }

    .output-area {
      flex: 1;
      padding: 16px;
      overflow-y: auto;
      font-family: 'Consolas', 'Monaco', monospace;
      font-size: 14px;
      line-height: 1.6;
      background: #fafafa;
      color: #333;
      white-space: pre-wrap;
      word-wrap: break-word;
    }

    .drop-zone {
      border: 2px dashed #ddd;
      border-radius: 8px;
      padding: 20px;
      text-align: center;
      color: #999;
      transition: all 0.3s;
      margin-bottom: 16px;
    }

    .drop-zone.dragover {
      border-color: #667eea;
      background: #f0f4ff;
      color: #667eea;
    }

    .status-bar {
      padding: 8px 16px;
      background: rgba(0, 0, 0, 0.1);
      font-size: 12px;
      color: white;
      display: flex;
      justify-content: space-between;
    }

    .template-select {
      padding: 6px 12px;
      border-radius: 6px;
      border: 1px solid rgba(255, 255, 255, 0.3);
      background: rgba(255, 255, 255, 0.1);
      color: white;
      font-size: 14px;
      cursor: pointer;
    }

    .template-select option {
      background: #333;
      color: white;
    }

    .toast {
      position: fixed;
      bottom: 40px;
      right: 20px;
      padding: 12px 24px;
      border-radius: 8px;
      color: white;
      font-size: 14px;
      opacity: 0;
      transform: translateY(20px);
      transition: all 0.3s;
      z-index: 1000;
    }

    .toast.show {
      opacity: 1;
      transform: translateY(0);
    }

    .toast.success {
      background: #4CAF50;
    }

    .toast.error {
      background: #f44336;
    }

    .checkbox-group {
      display: flex;
      gap: 16px;
      align-items: center;
    }

    .checkbox-group label {
      display: flex;
      align-items: center;
      gap: 6px;
      font-size: 12px;
      color: #666;
      cursor: pointer;
    }

    .checkbox-group input[type="checkbox"] {
      cursor: pointer;
    }

    .tab-bar {
      display: flex;
      gap: 4px;
    }

    .tab-btn {
      padding: 8px 20px;
      border: none;
      border-radius: 8px 8px 0 0;
      cursor: pointer;
      font-size: 14px;
      font-weight: 500;
      background: rgba(255,255,255,0.15);
      color: rgba(255,255,255,0.7);
      transition: all 0.2s;
    }

    .tab-btn:hover {
      background: rgba(255,255,255,0.25);
      color: white;
    }

    .tab-btn.active {
      background: white;
      color: #333;
    }

    .panel-output {
      display: none;
    }

    .panel-output.visible {
      display: flex;
    }

    .panel-input.full {
      flex: 1;
    }

    .panel-input.split {
      flex: 1;
    }

    .panel-output.split {
      flex: 1;
      display: flex;
    }

    .editor-tools {
      display: flex;
      gap: 8px;
      align-items: center;
    }

    .convert-tools {
      display: none;
      gap: 8px;
      align-items: center;
    }

    .convert-tools.visible {
      display: flex;
    }

    .view-toggle {
      display: flex;
      border: 1px solid #ddd;
      border-radius: 6px;
      overflow: hidden;
    }

    .view-toggle button {
      padding: 4px 14px;
      border: none;
      background: transparent;
      cursor: pointer;
      font-size: 12px;
      color: #999;
      transition: all 0.2s;
    }

    .view-toggle button.active {
      background: #667eea;
      color: white;
    }

    .view-toggle button:not(.active):hover {
      background: #eee;
    }

    .json-tree {
      flex: 1;
      overflow: auto;
      padding: 16px;
      font-family: 'Consolas', 'Monaco', monospace;
      font-size: 13px;
      line-height: 1.8;
      background: #1e1e1e;
      display: none;
    }

    .json-tree.visible {
      display: block;
    }

    .json-tree .toggle {
      cursor: pointer;
      user-select: none;
      color: #888;
      margin-right: 4px;
      font-size: 11px;
    }

    .json-tree .toggle:hover {
      color: #ccc;
    }

    .json-tree .key {
      color: #9cdcfe;
    }

    .json-tree .colon {
      color: #d4d4d4;
    }

    .json-tree .string {
      color: #ce9178;
    }

    .json-tree .number {
      color: #b5cea8;
    }

    .json-tree .boolean {
      color: #569cd6;
    }

    .json-tree .null {
      color: #569cd6;
    }

    .json-tree .bracket {
      color: #d4d4d4;
    }

    .json-tree .collapsed > .children {
      display: none;
    }

    .json-tree .collapsed > .toggle::before {
      content: '\25B6';
    }

    .json-tree .expanded > .toggle::before {
      content: '\25BC';
    }

    .json-tree .entry {
      padding-left: 20px;
    }

    .json-tree .children {
      padding-left: 0;
    }

    .excel-panel {
      display: none;
      flex: 1;
      padding: 20px;
      gap: 20px;
      overflow: hidden;
    }

    .excel-panel.visible {
      display: flex;
    }

    .excel-left {
      flex: 1;
      display: flex;
      flex-direction: column;
      gap: 16px;
      overflow-y: auto;
      background: white;
      border-radius: 16px;
      box-shadow: 0 10px 40px rgba(0, 0, 0, 0.2);
      padding: 20px;
    }

    .excel-right {
      flex: 1;
      display: flex;
      flex-direction: column;
      background: white;
      border-radius: 16px;
      box-shadow: 0 10px 40px rgba(0, 0, 0, 0.2);
      overflow: hidden;
    }

    .excel-upload {
      border: 2px dashed #ccc;
      border-radius: 12px;
      padding: 32px 20px;
      text-align: center;
      color: #999;
      transition: all 0.3s;
      cursor: pointer;
    }

    .excel-upload:hover,
    .excel-upload.dragover {
      border-color: #667eea;
      background: #f0f4ff;
      color: #667eea;
    }

    .excel-upload .upload-icon {
      font-size: 36px;
      margin-bottom: 8px;
    }

    .excel-upload .upload-hint {
      font-size: 14px;
    }

    .excel-upload .upload-formats {
      font-size: 12px;
      margin-top: 4px;
      color: #bbb;
    }

    .excel-config {
      display: flex;
      flex-direction: column;
      gap: 12px;
    }

    .excel-config-row {
      display: flex;
      align-items: center;
      gap: 12px;
    }

    .excel-config-row label {
      font-size: 13px;
      color: #555;
      min-width: 80px;
      white-space: nowrap;
    }

    .excel-config-row select,
    .excel-config-row input[type="number"] {
      flex: 1;
      padding: 6px 10px;
      border: 1px solid #ddd;
      border-radius: 6px;
      font-size: 13px;
      background: #fafafa;
      color: #333;
    }

    .excel-config-row select:focus,
    .excel-config-row input[type="number"]:focus {
      outline: none;
      border-color: #667eea;
    }

    .excel-group-row {
      display: none;
    }

    .excel-group-row.visible {
      display: flex;
    }

    .excel-preview {
      overflow: auto;
      border: 1px solid #eee;
      border-radius: 8px;
    }

    .excel-preview table {
      width: 100%;
      border-collapse: collapse;
      font-size: 12px;
    }

    .excel-preview th {
      background: #f5f5f5;
      padding: 8px 12px;
      text-align: left;
      font-weight: 600;
      color: #333;
      border-bottom: 2px solid #ddd;
      white-space: nowrap;
    }

    .excel-preview td {
      padding: 6px 12px;
      border-bottom: 1px solid #eee;
      color: #555;
      max-width: 200px;
      overflow: hidden;
      text-overflow: ellipsis;
      white-space: nowrap;
    }

    .excel-preview tr:hover td {
      background: #f8f9ff;
    }

    .excel-output-header {
      padding: 12px 20px;
      background: #f5f5f5;
      border-bottom: 1px solid #eee;
      display: flex;
      justify-content: space-between;
      align-items: center;
    }

    .excel-output-header h2 {
      font-size: 14px;
      font-weight: 600;
      color: #333;
    }

    .excel-output-actions {
      display: flex;
      gap: 8px;
    }

    .excel-output-body {
      flex: 1;
      overflow: hidden;
      display: flex;
      flex-direction: column;
    }

    .excel-output-body textarea {
      flex: 1;
      width: 100%;
      padding: 16px;
      border: none;
      resize: none;
      font-family: 'Consolas', 'Monaco', monospace;
      font-size: 14px;
      line-height: 1.6;
      background: #1e1e1e;
      color: #d4d4d4;
    }

    .excel-output-body textarea:focus {
      outline: none;
    }

    .excel-file-name {
      font-size: 12px;
      color: #667eea;
      margin-top: 4px;
    }

    .excel-section-title {
      font-size: 13px;
      font-weight: 600;
      color: #444;
      margin-bottom: 4px;
    }
  </style>
</head>
<body>
  <div class="header">
    <h1>Json处理器</h1>
    <div class="toolbar">
      <div class="tab-bar">
        <button class="tab-btn active" data-tab="editor">JSON 编辑</button>
        <button class="tab-btn" data-tab="convert">格式转换</button>
        <button class="tab-btn" data-tab="excel">Excel 转 JSON</button>
      </div>
    </div>
  </div>

  <div class="main-content">
    <div class="panel panel-input full" id="inputPanel">
      <div class="panel-header">
        <h2>JSON 输入</h2>
        <div class="editor-tools" id="editorTools">
          <div class="view-toggle">
            <button class="active" data-view="raw">原始</button>
            <button data-view="tree">树形</button>
          </div>
          <span style="font-size: 12px; color: #999;">拖拽 JSON 文件到此处</span>
          <button class="btn btn-secondary" id="saveBtn">保存</button>
          <button class="btn btn-secondary" id="saveAsBtn">另存为...</button>
        </div>
        <div class="convert-tools" id="convertTools">
          <select class="template-select" id="formatSelect">
            <option value="auto">自动检测格式</option>
            <option value="general">通用 JSON</option>
            <option value="chat">OpenAI messages[]</option>
            <option value="mapping">ChatGPT 导出 mapping</option>
            <option value="gemini">Gemini contents[]</option>
            <option value="deepseek">DeepSeek 对话树</option>
            <option value="claude">Claude / Anthropic</option>
            <option value="qwen">通义千问 Qwen</option>
            <option value="kimi">Kimi</option>
          </select>
          <button class="btn btn-primary" id="convertBtn">转换</button>
        </div>
      </div>
      <div class="panel-body">
        <div class="drop-zone" id="dropZone">
          将 JSON 文件拖拽到此处
        </div>
        <textarea id="jsonInput" placeholder='{"name": "在此粘贴 JSON 数据"}'></textarea>
        <div class="json-tree" id="jsonTree"></div>
      </div>
    </div>

    <div class="panel panel-output" id="outputPanel">
      <div class="panel-header">
        <h2>Markdown 输出</h2>
        <div class="checkbox-group">
          <label><input type="checkbox" id="sortCheck"> 排序键名</label>
          <span id="charCount" style="font-size: 12px; color: #999;">0 字符</span>
        </div>
        <div style="display:flex;gap:8px;margin-left:12px;">
          <button class="btn btn-secondary" id="copyBtn">复制</button>
          <button class="btn btn-warning" id="exportBtn">导出</button>
          <button class="btn btn-secondary" id="clearBtn">清空</button>
        </div>
      </div>
      <div class="panel-body">
        <div class="output-area" id="outputArea"></div>
      </div>
    </div>
  </div>

  <div class="excel-panel" id="excelPanel">
    <div class="excel-left">
      <div class="excel-upload" id="excelUpload">
        <div class="upload-icon">📊</div>
        <div class="upload-hint">拖拽 Excel 文件到此处，或点击选择</div>
        <div class="upload-formats">支持 .xlsx, .xls, .csv</div>
        <input type="file" id="excelFileInput" accept=".xlsx,.xls,.csv" style="display:none">
      </div>
      <div class="excel-file-name" id="excelFileName"></div>

      <div class="excel-config" id="excelConfig" style="display:none">
        <div class="excel-section-title">转换配置</div>
        <div class="excel-config-row">
          <label>工作表</label>
          <select id="excelSheetSelect"><option value="">请先上传文件</option></select>
        </div>
        <div class="excel-config-row">
          <label>表头行号</label>
          <input type="number" id="excelHeaderRow" value="0" min="0" title="0 表示第一行为表头">
        </div>
        <div class="excel-config-row">
          <label>输出格式</label>
          <select id="excelOutputFormat">
            <option value="object">对象数组</option>
            <option value="array">原始数组</option>
            <option value="grouped">分组</option>
          </select>
        </div>
        <div class="excel-config-row excel-group-row" id="excelGroupRow">
          <label>分组列</label>
          <select id="excelGroupBy"><option value="">请选择列</option></select>
        </div>
        <button class="btn btn-primary" id="excelConvertBtn" style="align-self:flex-start">转换</button>
      </div>

      <div id="excelPreviewWrap" style="display:none">
        <div class="excel-section-title">数据预览（前5行）</div>
        <div class="excel-preview" id="excelPreview"></div>
      </div>
    </div>

    <div class="excel-right">
      <div class="excel-output-header">
        <h2>JSON 输出</h2>
        <div class="excel-output-actions">
          <button class="btn btn-secondary" id="excelCopyBtn">复制</button>
          <button class="btn btn-warning" id="excelDownloadJsonBtn">下载 JSON</button>
          <button class="btn btn-secondary" id="excelDownloadMdBtn">下载 Markdown</button>
        </div>
      </div>
      <div class="excel-output-body">
        <textarea id="excelOutput" readonly placeholder="转换结果将显示在此处..."></textarea>
      </div>
    </div>
  </div>

  <div class="status-bar">
    <span id="status">就绪</span>
    <span id="conversionTime">0ms</span>
  </div>

  <div class="toast" id="toast"></div>

  <script>
    const CODE_LANGUAGE_MAP = [
      [/\busing\s+System/, 'csharp'],
      [/\bnamespace\s+\w+/, 'csharp'],
      [/\bpublic\s+(class|static|void|string|int|bool|float|double)\b/, 'csharp'],
      [/\bprivate\s+(void|int|string|bool|float)\b/, 'csharp'],
      [/\bConsole\.(Write|Read)/, 'csharp'],
      [/^#\s*include\s*[<"]/, 'cpp'],
      [/\bstd::/, 'cpp'],
      [/\bcout\s*<</, 'cpp'],
      [/\bprintf\s*\(/, 'c'],
      [/\bmalloc\s*\(/, 'c'],
      [/^import\s+(java|javax)\./, 'java'],
      [/\bpublic\s+(static\s+)?void\s+main/, 'java'],
      [/\bSystem\.out\.print/, 'java'],
      [/\bdef\s+\w+\s*\(.*\)\s*:/, 'python'],
      [/\bimport\s+\w+\s*$/, 'python'],
      [/^from\s+\w+\s+import/, 'python'],
      [/\bprint\s*\(/, 'python'],
      [/\bself\.\w+/, 'python'],
      [/^(let|const|var)\s+\w+\s*=/, 'javascript'],
      [/\bconsole\.log/, 'javascript'],
      [/\brequire\s*\(/, 'javascript'],
      [/\bmodule\.exports/, 'javascript'],
      [/^import\s+.*from\s+['"]/, 'typescript'],
      [/:\s*(string|number|boolean|void)\s*[={]/, 'typescript'],
      [/\binterface\s+\w+/, 'typescript'],
      [/\btype\s+\w+\s*=/, 'typescript'],
      [/^<!DOCTYPE\s+html/i, 'html'],
      [/<html[\s>]/i, 'html'],
      [/<div[\s>]/i, 'html'],
      [/\bSELECT\s+.*\bFROM\b/i, 'sql'],
      [/\bINSERT\s+INTO\b/i, 'sql'],
      [/\bCREATE\s+TABLE\b/i, 'sql'],
      [/\bUPDATE\s+\w+\s+SET\b/i, 'sql'],
      [/^[\w.-]+\s*\{[^}]*\}/m, 'css'],
      [/@media\s*\(/, 'css'],
      [/\bflex-direction:/, 'css'],
      [/^#!/, 'bash'],
      [/\bsudo\s+/, 'bash'],
      [/\bapt(-get)?\s+install/, 'bash'],
      [/\bnpm\s+install/, 'bash'],
      [/\bdocker\s+/, 'bash'],
      [/^---\s*$/m, 'yaml'],
      [/^\w+:\s*.+/m, 'yaml'],
      [/^"[\w.]+"\s*:\s*"/, 'json'],
    ];

    class JsonToMarkdownConverter {
      constructor(options = {}) {
        this.indent = options.indent || 2;
        this.sort = options.sort || false;
      }

      detectCodeLanguage(code) {
        const trimmed = code.trim();
        if (!trimmed) return '';
        for (const [pattern, lang] of CODE_LANGUAGE_MAP) {
          if (pattern.test(trimmed)) return lang;
        }
        return '';
      }

      hasMarkdownStructure(text) {
        const patterns = [
          /^#{1,6}\s+/m,
          /^\*{1,3}\s+/m,
          /^-{1,3}\s+/m,
          /^>\s+/m,
          /^\d+\.\s+/m,
          /\[.*\]\(.*\)/,
          /^---+$/m,
          /^\|.+\|/m,
        ];
        return patterns.some(p => p.test(text));
      }

      convert(jsonString) {
        let data;
        try {
          data = JSON.parse(jsonString);
        } catch (error) {
          throw new Error('无效的 JSON: ' + error.message);
        }
        return this.convertToMarkdown(data, 0);
      }

      convertChat(jsonString) {
        let data;
        try {
          data = JSON.parse(jsonString);
        } catch (error) {
          throw new Error('无效的 JSON: ' + error.message);
        }
        const messages = this.detectAndNormalizeChat(data);
        return this.renderChatToMarkdown(messages);
      }

      detectAndNormalizeChat(data) {
        if (Array.isArray(data)) {
          if (data.length > 0 && data[0].mapping) {
            const result = [];
            data.forEach((conv, idx) => {
              const title = conv.title || ('对话 ' + (idx + 1));
              if (data.length > 1) {
                result.push({ role: 'system', content: '---\n# ' + title + '\n---' });
              }
              result.push(...this.buildMessagesFromMapping(conv.mapping));
            });
            return result;
          }
          if (data.length > 0 && this.looksLikeMessageArray(data)) {
            return data.map(m => this.normalizeMessage(m));
          }
          throw new Error('无法识别的聊天格式：数组中的元素不包含有效的消息结构');
        }

        if (data.mapping) {
          return this.buildMessagesFromMapping(data.mapping, data.title);
        }

        if (data.messages && Array.isArray(data.messages)) {
          return data.messages.map(m => this.normalizeMessage(m));
        }

        if (data.contents && Array.isArray(data.contents)) {
          return data.contents.map(c => this.normalizeGeminiContent(c));
        }

        if (data.conversations && Array.isArray(data.conversations)) {
          return this.normalizeConversations(data);
        }

        if (this.isDeepSeekFormat(data)) {
          return this.normalizeDeepSeekChat(data);
        }

        if (this.isClaudeFormat(data)) {
          return this.normalizeClaudeChat(data);
        }

        if (this.isQwenFormat(data)) {
          return this.normalizeQwenChat(data);
        }

        if (this.isKimiFormat(data)) {
          return this.normalizeKimiChat(data);
        }

        throw new Error('无法识别的聊天格式，支持: messages[], contents[], conversations[], mapping, deepseek, claude, qwen, kimi 或消息数组');
      }

      looksLikeMessageArray(arr) {
        if (arr.length === 0) return false;
        return arr.every(item =>
          item && typeof item === 'object' && typeof item.role === 'string'
        );
      }

      normalizeConversations(data) {
        const result = [];
        data.conversations.forEach((conv, i) => {
          const title = conv.title || conv.name || ('对话 ' + (i + 1));
          if (data.conversations.length > 1) {
            result.push({ role: 'system', content: '---\n# ' + title + '\n---' });
          }
          const msgs = conv.messages || conv.chats || conv.conversation || [];
          if (Array.isArray(msgs)) {
            result.push(...msgs.map(m => this.normalizeMessage(m)));
          }
        });
        return result;
      }

      isClaudeFormat(data) {
        if (typeof data !== 'object' || data === null || Array.isArray(data)) return false;
        if (data.messages && Array.isArray(data.messages)) {
          const first = data.messages[0];
          if (first && Array.isArray(first.content) && first.content.some(b =>
            b.type === 'thinking' || b.type === 'text' || b.type === 'tool_use' || b.type === 'tool_result'
          )) {
            return true;
          }
        }
        if (Array.isArray(data) && data.length > 0) {
          const first = data[0];
          if (first && Array.isArray(first.content) && first.content.some(b =>
            b.type === 'thinking' || b.type === 'text' || b.type === 'tool_use' || b.type === 'tool_result'
          )) {
            return true;
          }
        }
        return false;
      }

      normalizeClaudeChat(data) {
        const msgs = data.messages || (Array.isArray(data) ? data : []);
        return msgs.map(m => this.normalizeMessage(m));
      }

      isQwenFormat(data) {
        if (typeof data !== 'object' || data === null || Array.isArray(data)) return false;
        if (Array.isArray(data)) {
          if (data.length > 0 && data[0].chatId) return true;
        }
        if (data.chatId || data.chat_id) return true;
        if (data.chats && Array.isArray(data.chats)) return true;
        return false;
      }

      normalizeQwenChat(data) {
        const result = [];
        const chats = data.chats || (Array.isArray(data) ? data : [data]);

        chats.forEach((chat, idx) => {
          const title = chat.title || chat.chatId || ('对话 ' + (idx + 1));
          if (chats.length > 1) {
            result.push({ role: 'system', content: '---\n# ' + title + '\n---' });
          }
          const msgs = chat.messages || chat.chatItems || [];
          if (Array.isArray(msgs)) {
            msgs.forEach(m => {
              const role = m.role || m.senderType || 'unknown';
              let content = '';
              if (typeof m.content === 'string') {
                content = m.content;
              } else if (m.content && typeof m.content === 'object') {
                content = m.content.text || m.content.body || JSON.stringify(m.content, null, 2);
              }
              result.push({
                role: role,
                content: content,
                timestamp: this.formatTimestamp(m.createdAt || m.createTime || m.timestamp),
                model: m.model,
              });
            });
          }
        });

        return result;
      }

      isKimiFormat(data) {
        if (typeof data !== 'object' || data === null || Array.isArray(data)) return false;
        if (data.chatRecords && Array.isArray(data.chatRecords)) return true;
        if (data.item_list && Array.isArray(data.item_list)) return true;
        return false;
      }

      normalizeKimiChat(data) {
        const result = [];
        const records = data.chatRecords || data.item_list || [];

        if (data.name || data.title) {
          result.push({ role: 'system', content: '---\n# ' + (data.name || data.title) + '\n---' });
        }

        records.forEach(item => {
          const role = item.role === 'user' ? 'user'
            : item.role === 'assistant' ? 'assistant'
            : item.role || 'unknown';
          let content = '';
          if (typeof item.text === 'string') {
            content = item.text;
          } else if (typeof item.content === 'string') {
            content = item.content;
          } else if (Array.isArray(item.messages)) {
            content = item.messages
              .map(m => m.content || m.text || '')
              .filter(Boolean)
              .join('\n\n');
          }
          result.push({
            role: role,
            content: content,
            timestamp: this.formatTimestamp(item.created_at || item.createTime),
            model: item.model,
          });
        });

        return result;
      }

      isDeepSeekFormat(data) {
        if (typeof data !== 'object' || data === null || Array.isArray(data)) return false;
        const keys = Object.keys(data);
        if (keys.length === 0) return false;
        const sampleKeys = keys.slice(0, 5);
        let matchCount = 0;
        sampleKeys.forEach(key => {
          const node = data[key];
          if (
            node
            && typeof node === 'object'
            && typeof node.id !== 'undefined'
            && node.message
            && typeof node.message === 'object'
            && Array.isArray(node.message.fragments)
          ) {
            matchCount++;
          }
        });
        return matchCount > 0;
      }

      normalizeDeepSeekChat(data) {
        const nodeIds = Object.keys(data);
        const childrenMap = {};
        const parentMap = {};
        let rootId = null;

        nodeIds.forEach(id => {
          const node = data[id];
          const parent = node.parent || null;
          parentMap[id] = parent;
          if (!parent) {
            rootId = id;
          } else {
            if (!childrenMap[parent]) childrenMap[parent] = [];
            childrenMap[parent].push(id);
          }
        });

        if (!rootId && nodeIds.length > 0) {
          let candidate = nodeIds[0];
          for (let i = 0; i < nodeIds.length; i++) {
            const p = parentMap[candidate];
            if (!p) break;
            candidate = p;
          }
          rootId = candidate;
        }

        if (!rootId) return [];

        const orderedIds = [];
        const walk = (id) => {
          const children = childrenMap[id] || [];
          children.forEach(childId => {
            orderedIds.push(childId);
            walk(childId);
          });
        };
        walk(rootId);

        const messages = [];
        orderedIds.forEach(id => {
          const node = data[id];
          const msg = node.message;
          if (!msg) return;

          const fragments = [];
          if (Array.isArray(msg.fragments)) {
            msg.fragments.forEach(frag => {
              const role = frag.type === 'REQUEST' ? 'user'
                : frag.type === 'RESPONSE' ? 'assistant'
                : frag.type === 'SYSTEM' ? 'system'
                : 'unknown';
              fragments.push({
                role: role,
                content: frag.content || '',
                timestamp: this.formatTimestamp(msg.inserted_at),
              });
            });
          }

          if (fragments.length === 0) {
            const content = typeof msg.content === 'string' ? msg.content : '';
            if (content) {
              fragments.push({ role: 'unknown', content: content });
            }
          }

          fragments.forEach(frag => {
            if (msg.model && frag.role === 'assistant') {
              frag.content = '_模型: ' + msg.model + '_\n\n' + frag.content;
            }
            messages.push(frag);
          });
        });

        return messages;
      }

      buildMessagesFromMapping(mapping, title) {
        const messages = [];
        const nodeIds = Object.keys(mapping);
        const childrenMap = {};
        const parentMap = {};
        let rootId = null;

        nodeIds.forEach(id => {
          const node = mapping[id];
          const parent = node.parent || null;
          parentMap[id] = parent;
          if (!parent) {
            rootId = id;
          } else {
            if (!childrenMap[parent]) childrenMap[parent] = [];
            childrenMap[parent].push(id);
          }
        });

        if (!rootId && nodeIds.length > 0) {
          let candidate = nodeIds[0];
          for (let i = 0; i < nodeIds.length; i++) {
            const p = parentMap[candidate];
            if (!p) break;
            candidate = p;
          }
          rootId = candidate;
        }

        if (!rootId) return messages;

        const orderedIds = [];
        const walk = (id) => {
          (childrenMap[id] || []).forEach(childId => {
            orderedIds.push(childId);
            walk(childId);
          });
        };
        walk(rootId);

        orderedIds.forEach(id => {
          const node = mapping[id];
          const msg = node.message;
          if (!msg) return;

          if (msg.author && msg.author.role) {
            msg.role = msg.author.role;
          }

          const normalized = this.normalizeMessage(msg);
          if (msg.metadata && msg.metadata.model_slug) {
            normalized.content = '_模型: ' + msg.metadata.model_slug + '_\n\n' + normalized.content;
          }
          messages.push(normalized);
        });

        return messages;
      }

      normalizeMessage(msg) {
        const role = msg.role || 'unknown';
        let content = '';

        if (typeof msg.content === 'string') {
          content = msg.content;
        } else if (Array.isArray(msg.content)) {
          content = this.normalizeContentBlocks(msg.content);
        } else if (msg.content && typeof msg.content === 'object') {
          const parts = msg.content.parts;
          if (Array.isArray(parts)) {
            content = parts.filter(p => typeof p === 'string').join('\n');
          } else if (msg.content.content_type === 'text' && typeof msg.content.text === 'string') {
            content = msg.content.text;
          } else {
            content = JSON.stringify(msg.content, null, 2);
          }
        }

        const timestamp = msg.timestamp || msg.created_at || msg.created || msg.time || msg.create_time;
        const tool_calls = msg.tool_calls || (msg.content && msg.content.tool_calls);
        let reasoning_content = msg.reasoning_content;
        if (!reasoning_content && msg.content && typeof msg.content === 'object') {
          reasoning_content = msg.content.reasoning_content;
        }

        return {
          role: role,
          reasoning_content: reasoning_content || undefined,
          content: content || '',
          name: msg.name,
          timestamp: this.formatTimestamp(timestamp),
          tool_calls: tool_calls,
          tool_call_id: msg.tool_call_id,
          model: msg.model,
        };
      }

      formatTimestamp(ts) {
        if (!ts) return undefined;
        if (typeof ts === 'number') {
          try {
            const d = new Date(ts * 1000);
            return d.toISOString().replace('T', ' ').replace(/\.\d+Z/, '');
          } catch {
            return String(ts);
          }
        }
        return String(ts).replace('T', ' ').replace(/\.\d+Z/, '').replace(/\.\d+/, '');
      }

      normalizeGeminiContent(content) {
        const role = content.role === 'model' ? 'assistant' : (content.role || 'user');
        let text = '';
        if (content.parts && Array.isArray(content.parts)) {
          text = content.parts.filter(p => p.text !== undefined).map(p => p.text).join('\n');
          if (content.parts.some(p => p.inline_data)) {
            text += '\n\n_[附件内容]_';
          }
        }
        return { role: role, content: text };
      }

      renderChatToMarkdown(messages) {
        let result = '# 对话记录\n\n';
        let msgIndex = 0;

        messages.forEach(msg => {
          if (msg.role === 'system' && msg.content.startsWith('---\n# ')) {
            result += msg.content + '\n\n';
            return;
          }
          msgIndex++;
          const roleLabel = this.getRoleLabel(msg.role);
          const ts = msg.timestamp ? (' | ' + msg.timestamp) : '';
          result += '## ' + msgIndex + '. ' + roleLabel + ts + '\n\n';

          if (msg.name) {
            result += '> **名称**: ' + msg.name + '\n\n';
          }

          if (msg.reasoning_content) {
            result += '> **推理过程:**\n>\n';
            const processed = this.processContent(msg.reasoning_content);
            result += this.wrapBlockquote(processed) + '\n\n';
          }

          if (msg.content) {
            result += this.processContent(msg.content) + '\n\n';
          }

          if (msg.tool_calls && msg.tool_calls.length > 0) {
            result += '**工具调用:**\n\n';
            msg.tool_calls.forEach(tc => {
              const idStr = tc.id ? ' (ID: `' + tc.id + '`)' : '';
              result += '- **' + tc.function.name + '**' + idStr + '\n';
              try {
                const args = JSON.parse(tc.function.arguments);
                result += '  ```json\n  ' + JSON.stringify(args, null, 2).replace(/\n/g, '\n  ') + '\n  ```\n';
              } catch {
                result += '  ```\n  ' + tc.function.arguments + '\n  ```\n';
              }
            });
            result += '\n';
          }

          if (msg.tool_call_id) {
            result += '> 工具响应 `' + msg.tool_call_id + '`\n\n';
          }

          result += '---\n\n';
        });

        if (msgIndex === 0) {
          result += '_（无消息）_\n';
        }
        return result.trim();
      }

      getRoleLabel(role) {
        switch (role) {
          case 'user': return '用户';
          case 'assistant': return '助手';
          case 'system': return '系统';
          case 'tool': return '工具';
          case 'model': return '模型';
          default: return role.charAt(0).toUpperCase() + role.slice(1);
        }
      }

      processContent(content) {
        if (!content) return '';
        let result = content
          .replace(/\\n/g, '\n')
          .replace(/\\t/g, '\t')
          .replace(/\\"/g, '"')
          .replace(/\\'/g, "'");

        if (this.hasMarkdownStructure(result)) {
          return result;
        }

        const hasCodeFence = result.startsWith('```') || result.endsWith('```') || result.includes('\n```') || result.includes('```\n');
        const hasCodeBlock = /```[\s\S]*```/.test(result);
        const hasTable = /\|.+\|/.test(result) && /\|[\s\-:]+\|/m.test(result);

        if (hasCodeFence || hasCodeBlock || hasTable) {
          return result;
        }

        const lines = result.split('\n');
        const hasLongLine = lines.some(line => line.length > 80);
        if (hasLongLine || lines.length > 5) {
          const lang = this.detectCodeLanguage(result);
          return '```' + lang + '\n' + result + '\n```';
        }
        return result;
      }

      wrapBlockquote(text) {
        return text.split('\n').map(line => '> ' + line).join('\n');
      }

      normalizeContentBlocks(blocks) {
        const parts = [];
        blocks.forEach(block => {
          if (typeof block === 'string') {
            parts.push(block);
          } else if (block.type === 'text') {
            parts.push(block.text || '');
          } else if (block.type === 'code') {
            const lang = block.language || '';
            parts.push('```' + lang + '\n' + (block.code || block.text || '') + '\n```');
          } else if (block.type === 'image_url' || block.type === 'image') {
            parts.push('_[图片内容]_');
          } else if (block.type === 'thinking') {
            parts.push('> **思考过程**\n> ' + this.wrapBlockquote(block.thinking || block.text || ''));
          } else if (block.type === 'tool_use') {
            parts.push('**工具调用**: `' + (block.name || 'unknown') + '`\n```json\n' + JSON.stringify(block.input || {}, null, 2) + '\n```');
          } else if (block.type === 'tool_result') {
            parts.push('**工具结果**:\n```\n' + (typeof block.content === 'string' ? block.content : JSON.stringify(block.content, null, 2)) + '\n```');
          } else if (block.type === 'text_delta') {
            parts.push(block.text || '');
          }
        });
        return parts.join('\n\n');
      }

      convertToMarkdown(value, depth) {
        const indentStr = ' '.repeat(this.indent * depth);

        if (value === null) return 'null';
        if (value === undefined) return 'undefined';

        switch (typeof value) {
          case 'string':
            return this.convertString(value, depth);
          case 'number':
          case 'boolean':
            return String(value);
          case 'object':
            if (Array.isArray(value)) {
              return this.convertArray(value, depth);
            }
            return this.convertObject(value, depth);
          default:
            return String(value);
        }
      }

      convertString(value, depth) {
        if (this.isJsonString(value)) {
          return '\n' + ' '.repeat(this.indent * depth) + '```json\n' + value + '\n' + ' '.repeat(this.indent * depth) + '```';
        }
        if (this.isCodeString(value)) {
          const lang = this.detectCodeLanguage(value);
          return '\n' + ' '.repeat(this.indent * depth) + '```' + lang + '\n' + value + '\n' + ' '.repeat(this.indent * depth) + '```';
        }
        if (this.isMarkdownString(value)) {
          return value;
        }
        if (value.includes('\n') && value.split('\n').length > 3) {
          const lang = this.detectCodeLanguage(value);
          return '\n' + ' '.repeat(this.indent * depth) + '```' + lang + '\n' + value + '\n' + ' '.repeat(this.indent * depth) + '```';
        }
        return value;
      }

      isJsonString(value) {
        try {
          const parsed = JSON.parse(value);
          return typeof parsed === 'object' && parsed !== null;
        } catch {
          return false;
        }
      }

      isCodeString(value) {
        const trimmed = value.trim();
        const codePatterns = [
          /^(function|const|let|var|class|import|export)\s/,
          /^[a-zA-Z_$][\w$]*\s*\(.*\)\s*\{/,
          /^#\s*include\s*[<"]/,
          /\busing\s+System/,
          /\bnamespace\s+\w+/,
          /\bdef\s+\w+\s*\(.*\)\s*:/,
          /\bSELECT\s+.*\bFROM\b/i,
        ];
        return codePatterns.some(pattern => pattern.test(trimmed));
      }

      isMarkdownString(value) {
        return this.hasMarkdownStructure(value);
      }

      convertArray(arr, depth) {
        if (arr.length === 0) return '[]';
        if (this.isTableData(arr)) return this.convertToTable(arr);

        const indentStr = ' '.repeat(this.indent * depth);
        let result = '\n';

        arr.forEach((item, index) => {
          const isObjectItem = typeof item === 'object' && item !== null && !Array.isArray(item);
          if (isObjectItem) {
            result += indentStr + '- **Item ' + (index + 1) + '**\n';
            Object.keys(item).forEach(key => {
              const val = this.convertToMarkdown(item[key], depth + 2);
              result += ' '.repeat(this.indent * (depth + 1)) + '- **' + key + '**: ' + val.trimStart() + '\n';
            });
          } else {
            result += indentStr + '- ' + this.convertToMarkdown(item, depth + 1) + '\n';
          }
        });
        return result;
      }

      isTableData(arr) {
        if (arr.length === 0) return false;
        if (!arr.every(item => typeof item === 'object' && item !== null && !Array.isArray(item))) {
          return false;
        }
        const keySets = arr.map(item => new Set(Object.keys(item)));
        if (keySets.length === 0) return false;
        const commonKeys = new Set([...keySets[0]]);
        for (let i = 1; i < keySets.length; i++) {
          for (const key of commonKeys) {
            if (!keySets[i].has(key)) {
              commonKeys.delete(key);
            }
          }
        }
        return commonKeys.size >= 2;
      }

      convertToTable(arr) {
        if (arr.length === 0) return '[]';
        const allKeys = new Set();
        arr.forEach(item => Object.keys(item).forEach(k => allKeys.add(k)));
        const keys = [...allKeys];
        const header = '| ' + keys.join(' | ') + ' |';
        const separator = '| ' + keys.map(() => '---').join(' | ') + ' |';
        const rows = arr.map(item => {
          const values = keys.map(key => {
            const value = item[key];
            if (value === null || value === undefined) return '';
            if (typeof value === 'object') {
              return this.renderTableCellObject(value);
            }
            const cleaned = String(value).replace(/\n/g, ' ').replace(/\|/g, '\\|');
            if (cleaned.length > 100) {
              return cleaned.substring(0, 100) + '...';
            }
            return cleaned;
          });
          return '| ' + values.join(' | ') + ' |';
        });
        return '\n' + header + '\n' + separator + '\n' + rows.join('\n') + '\n';
      }

      renderTableCellObject(value) {
        if (Array.isArray(value)) {
          if (value.length === 0) return '[]';
          if (value.every(v => typeof v !== 'object')) {
            return value.join(', ');
          }
          return '<details><summary>[' + value.length + '项]</summary>' + JSON.stringify(value, null, 2).replace(/\n/g, '<br>') + '</details>';
        }
        const json = JSON.stringify(value, null, 2);
        const preview = json.substring(0, 80);
        if (json.length > 80) {
          return '<details><summary>' + preview.replace(/\n/g, ' ').replace(/\|/g, '\\|') + '...</summary>' + json.replace(/\n/g, '<br>').replace(/\|/g, '\\|') + '</details>';
        }
        return preview.replace(/\n/g, ' ').replace(/\|/g, '\\|');
      }

      convertObject(obj, depth) {
        const keys = Object.keys(obj);
        if (this.sort) keys.sort();
        const indentStr = ' '.repeat(this.indent * depth);
        let result = '';

        keys.forEach((key, index) => {
          const value = obj[key];
          const isLast = index === keys.length - 1;
          const titleLevel = Math.min(depth + 1, 6);
          const title = '#'.repeat(titleLevel) + ' ' + key;

          if (index === 0) {
            result += indentStr + title + '\n';
          } else {
            result += '\n' + indentStr + title + '\n';
          }
          result += this.convertToMarkdown(value, depth + 1);
          if (!isLast && depth < 4) result += '\n';
        });
        return result;
      }
    }

    const jsonInput = document.getElementById('jsonInput');
    const outputArea = document.getElementById('outputArea');
    const inputPanel = document.getElementById('inputPanel');
    const outputPanel = document.getElementById('outputPanel');
    const dropZone = document.getElementById('dropZone');
    const copyBtn = document.getElementById('copyBtn');
    const exportBtn = document.getElementById('exportBtn');
    const clearBtn = document.getElementById('clearBtn');
    const convertBtn = document.getElementById('convertBtn');
    const saveBtn = document.getElementById('saveBtn');
    const saveAsBtn = document.getElementById('saveAsBtn');
    const sortCheck = document.getElementById('sortCheck');
    const formatSelect = document.getElementById('formatSelect');
    const editorTools = document.getElementById('editorTools');
    const convertTools = document.getElementById('convertTools');
    const status = document.getElementById('status');
    const charCount = document.getElementById('charCount');
    const conversionTime = document.getElementById('conversionTime');
    const toast = document.getElementById('toast');
    const tabBtns = document.querySelectorAll('.tab-btn');
    const STORAGE_KEY = 'json2md_input';
    let currentFileName = 'data.json';
    let currentView = 'raw';

    function renderJsonTree() {
      const container = document.getElementById('jsonTree');
      const text = jsonInput.value.trim();
      if (!text) { container.innerHTML = ''; return; }
      try {
        const data = JSON.parse(text);
        container.innerHTML = buildTree(data);
        container.querySelectorAll('.toggle').forEach(el => {
          el.addEventListener('click', () => {
            const parent = el.parentElement;
            parent.classList.toggle('collapsed');
            parent.classList.toggle('expanded');
          });
        });
      } catch {
        container.innerHTML = '<span style="color:#f48771;">无效 JSON</span>';
      }
    }

    function buildTree(value, key = null) {
      if (value === null) {
        const k = key ? `<span class="key">"${key}"</span><span class="colon">: </span>` : '';
        return k + '<span class="null">null</span>';
      }
      if (typeof value === 'boolean') {
        const k = key ? `<span class="key">"${key}"</span><span class="colon">: </span>` : '';
        return k + '<span class="boolean">' + value + '</span>';
      }
      if (typeof value === 'number') {
        const k = key ? `<span class="key">"${key}"</span><span class="colon">: </span>` : '';
        return k + '<span class="number">' + value + '</span>';
      }
      if (typeof value === 'string') {
        const k = key ? `<span class="key">"${key}"</span><span class="colon">: </span>` : '';
        const escaped = value.replace(/&/g, '&amp;').replace(/</g, '&lt;').replace(/>/g, '&gt;');
        return k + '<span class="string">"' + escaped + '"</span>';
      }
      if (Array.isArray(value)) {
        const k = key ? `<span class="key">"${key}"</span><span class="colon">: </span>` : '';
        if (value.length === 0) return k + '<span class="bracket">[]</span>';
        const items = value.map((v, i) => '<div class="entry">' + buildTree(v, i) + '<span class="bracket">,</span></div>');
        items[items.length - 1] = items[items.length - 1].replace(',</div>', '</div>');
        return '<div class="expanded"><span class="toggle"></span>' + k + '<span class="bracket">[</span><span class="bracket" style="color:#888;" id="count">' + value.length + '</span><span class="bracket">]</span><div class="children">' + items.join('') + '</div></div>';
      }
      if (typeof value === 'object') {
        const k = key ? `<span class="key">"${key}"</span><span class="colon">: </span>` : '';
        const keys = Object.keys(value);
        if (keys.length === 0) return k + '<span class="bracket">{}</span>';
        const items = keys.map(k2 => '<div class="entry">' + buildTree(value[k2], k2) + '<span class="bracket">,</span></div>');
        items[items.length - 1] = items[items.length - 1].replace(',</div>', '</div>');
        return '<div class="expanded"><span class="toggle"></span>' + k + '<span class="bracket">{</span><span class="bracket" style="color:#888;" id="count">' + keys.length + '</span><span class="bracket">}</span><div class="children">' + items.join('') + '</div></div>';
      }
      return '';
    }

    document.querySelectorAll('.view-toggle button').forEach(btn => {
      btn.addEventListener('click', () => {
        document.querySelectorAll('.view-toggle button').forEach(b => b.classList.remove('active'));
        btn.classList.add('active');
        currentView = btn.dataset.view;
        const tree = document.getElementById('jsonTree');
        const textarea = document.getElementById('jsonInput');
        if (currentView === 'tree') {
          textarea.style.display = 'none';
          tree.classList.add('visible');
          renderJsonTree();
        } else {
          textarea.style.display = '';
          tree.classList.remove('visible');
        }
      });
    });

    jsonInput.addEventListener('input', () => {
      localStorage.setItem(STORAGE_KEY, jsonInput.value);

    });

    function showToast(message, type = 'success') {
      toast.textContent = message;
      toast.className = 'toast ' + type + ' show';
      setTimeout(() => toast.classList.remove('show'), 3000);
    }

    function switchTab(tab) {
      tabBtns.forEach(b => b.classList.toggle('active', b.dataset.tab === tab));
      const excelPanel = document.getElementById('excelPanel');
      const mainContent = document.querySelector('.main-content');

      if (tab === 'editor') {
        inputPanel.className = 'panel panel-input full';
        outputPanel.classList.remove('visible');
        editorTools.style.display = 'flex';
        convertTools.classList.remove('visible');
        mainContent.style.display = 'flex';
        excelPanel.classList.remove('visible');
      } else if (tab === 'convert') {
        inputPanel.className = 'panel panel-input split';
        outputPanel.classList.add('visible');
        editorTools.style.display = 'none';
        convertTools.classList.add('visible');
        mainContent.style.display = 'flex';
        excelPanel.classList.remove('visible');
      } else if (tab === 'excel') {

        excelPanel.classList.add('visible');

    }

    tabBtns.forEach(btn => {

    function forceChatFormat(data, format) {
      switch (format) {
        case 'chat':
          if (data.messages && Array.isArray(data.messages)) return data;
          return { messages: Array.isArray(data) ? data : [data] };
        case 'mapping':
          if (data.mapping) return data;
          return { title: '对话', mapping: data.mapping || {} };
        case 'gemini':
          if (data.contents) return data;
          return { contents: Array.isArray(data) ? data : [{ role: 'user', parts: [{ text: JSON.stringify(data) }] }] };
        case 'deepseek':
          return data;
        case 'claude':
          if (data.messages && Array.isArray(data.messages)) return data;
          return { messages: Array.isArray(data) ? data : [data] };
        case 'qwen':
          if (data.chats && Array.isArray(data.chats)) return data;
          if (data.chatId || data.chat_id) return data;
          return { chats: [data] };
        case 'kimi':
          if (data.chatRecords && Array.isArray(data.chatRecords)) return data;
          if (data.item_list && Array.isArray(data.item_list)) return data;
          return data;
        default:
          return data;
      }
    }

    function convertJson() {
      const jsonText = jsonInput.value.trim();
      localStorage.setItem(STORAGE_KEY, jsonInput.value);

      if (!jsonText) {
        outputArea.textContent = '';
        charCount.textContent = '0 字符';
        conversionTime.textContent = '0ms';
        status.textContent = '就绪';
        return;
      }

      status.textContent = '转换中...';
      const startTime = Date.now();

      try {
        const converter = new JsonToMarkdownConverter({ indent: 2, sort: sortCheck.checked });
        const format = formatSelect.value;
        const parsed = JSON.parse(jsonText);
        let result;

        if (format === 'general') {
          result = converter.convert(jsonText);
          status.textContent = '成功';
        } else {
          const data = format === 'auto' ? parsed : forceChatFormat(parsed, format);
          try {
            const chatMessages = converter.detectAndNormalizeChat(data);
            result = converter.renderChatToMarkdown(chatMessages);
            status.textContent = '聊天格式 - ' + formatSelect.options[formatSelect.selectedIndex].text;
          } catch (chatError) {
            result = converter.convert(JSON.stringify(data, null, 2));
            status.textContent = '成功（未检测到聊天格式）';
          }
        }

        outputArea.textContent = result;
        charCount.textContent = result.length + ' 字符';
      } catch (error) {
        outputArea.textContent = '错误: ' + error.message;
        status.textContent = '错误';
        showToast('转换失败！', 'error');
      }

      conversionTime.textContent = (Date.now() - startTime) + 'ms';
    }

    convertBtn.addEventListener('click', convertJson);

    async function saveJson(saveAs = false) {
      const text = jsonInput.value.trim();
      if (!text) { showToast('没有内容可保存！', 'error'); return; }

      try {
        JSON.parse(text);
      } catch {
        showToast('JSON 格式无效，无法保存！', 'error');
        return;
      }

      const blob = new Blob([text], { type: 'application/json' });

      if (!saveAs && window.showSaveFilePicker) {
        try {
          const handle = await window.showSaveFilePicker({
            suggestedName: currentFileName,
            types: [{ description: 'JSON 文件', accept: { 'application/json': ['.json'] } }]
          });
          const writable = await handle.createWritable();
          await writable.write(blob);
          await writable.close();
          currentFileName = handle.name;
          showToast('已保存 ' + currentFileName);
          return;
        } catch (err) {
          if (err.name === 'AbortError') return;
        }
      }

      const url = URL.createObjectURL(blob);
      const a = document.createElement('a');
      a.href = url;
      a.download = saveAs ? 'data.json' : currentFileName;
      document.body.appendChild(a);
      a.click();
      document.body.removeChild(a);
      URL.revokeObjectURL(url);
      showToast('已保存 ' + a.download);
    }

    saveBtn.addEventListener('click', () => saveJson(false));
    saveAsBtn.addEventListener('click', () => saveJson(true));

    {

      if (saved) {

      }
    }

    class ExcelToJsonConverter {
      convert(buffer, options = {}) {
        const workbook = XLSX.read(buffer, { type: 'array' });
        const sheet = this._getSheet(workbook, options);
        const data = this._parseSheet(sheet, options);

        switch (options.outputFormat) {
          case 'object':
            return this._toArrayOfObjects(data);
          case 'grouped':
            return this._toGrouped(data, options.groupByKey);
          case 'array':
          default:
            return data;
        }
      }

      getSheetInfo(buffer) {
        const workbook = XLSX.read(buffer, { type: 'array' });
        return workbook.SheetNames.map((name, index) => {
          const sheet = workbook.Sheets[name];
          const range = XLSX.utils.decode_range(sheet['!ref'] || 'A1');
          const rowCount = range.e.r - range.s.r + 1;
          const colCount = range.e.c - range.s.c + 1;
          const headers = this._extractHeaders(sheet, range);
          const preview = this._extractPreview(sheet, range, 5);
          return { name, index, rowCount, colCount, headers, preview };
        });
      }

      _getSheet(workbook, options) {
        if (options.sheetName) {
          const sheet = workbook.Sheets[options.sheetName];
          if (!sheet) throw new Error('工作表 "' + options.sheetName + '" 不存在');
          return sheet;
        }
        const index = options.sheetIndex ?? 0;
        const name = workbook.SheetNames[index];
        if (!name) throw new Error('工作表索引 ' + index + ' 超出范围');
        return workbook.Sheets[name];
      }

      _parseSheet(sheet, options) {
        const range = options.range
          ? XLSX.utils.decode_range(options.range)
          : XLSX.utils.decode_range(sheet['!ref'] || 'A1');

        const headerRow = options.headerRow ?? 0;
        const startRow = range.s.r + headerRow + 1;

        const rows = [];
        for (let r = startRow; r <= range.e.r; r++) {
          const row = [];
          let hasData = false;
          for (let c = range.s.c; c <= range.e.c; c++) {
            const cell = sheet[XLSX.utils.encode_cell({ r, c })];
            const value = cell ? this._parseCellValue(cell) : '';
            if (value !== '' && value !== null && value !== undefined) hasData = true;
            row.push(value);
          }
          if (hasData || options.includeEmpty) {
            rows.push(row);
          }
        }
        return rows;
      }

      _parseCellValue(cell) {
        switch (cell.t) {
          case 'n':
            if (cell.v !== null && Number.isInteger(cell.v) && Math.abs(cell.v) > 30000 && cell.v < 100000) {
              const date = XLSX.SSF.parse_date_code(cell.v);
              if (date) {
                return date.y + '-' + String(date.m).padStart(2, '0') + '-' + String(date.d).padStart(2, '0');
              }
            }
            return cell.v;
          case 'b':
            return cell.v;
          case 'd':
            return cell.v;
          default:
            return cell.v !== null && cell.v !== undefined ? String(cell.v) : '';
        }
      }

      _extractHeaders(sheet, range) {
        const headers = [];
        for (let c = range.s.c; c <= range.e.c; c++) {
          const cell = sheet[XLSX.utils.encode_cell({ r: range.s.r, c })];
          headers.push(cell ? String(cell.v || '') : '列' + (c + 1));
        }
        return headers;
      }

      _extractPreview(sheet, range, maxRows) {
        const rows = [];
        const startRow = range.s.r + 1;
        const endRow = Math.min(startRow + maxRows - 1, range.e.r);
        for (let r = startRow; r <= endRow; r++) {
          const row = [];
          for (let c = range.s.c; c <= range.e.c; c++) {
            const cell = sheet[XLSX.utils.encode_cell({ r, c })];
            row.push(cell ? cell.v : '');
          }
          rows.push(row);
        }
        return rows;
      }

      _toArrayOfObjects(data) {
        if (data.length === 0) return [];
        const headers = data[0];
        return data.slice(1).map(row => {
          const obj = {};
          headers.forEach((header, i) => {
            const key = String(header || '列' + (i + 1)).trim();
            obj[key] = row[i] !== undefined ? row[i] : null;
          });
          return obj;
        });
      }

      _toGrouped(data, groupByKey) {
        const objects = this._toArrayOfObjects(data);
        if (!groupByKey || objects.length === 0) {
          return { all: objects };
        }
        const result = {};
        objects.forEach(obj => {
          const key = String(obj[groupByKey] ?? '未分组');
          if (!result[key]) result[key] = [];
          const rest = Object.assign({}, obj);
          delete rest[groupByKey];
          result[key].push(rest);
        });
        return result;
      }
    }

    let excelBuffer = null;
    let excelSheetInfoList = [];
    const excelConverter = new ExcelToJsonConverter();

    function handleExcelFile(file) {
      if (!file) return;
      const validExts = ['.xlsx', '.xls', '.csv'];
      const ext = '.' + file.name.split('.').pop().toLowerCase();
      if (!validExts.includes(ext)) {
        showToast('请上传 .xlsx, .xls 或 .csv 文件！', 'error');
        return;
      }

      document.getElementById('excelFileName').textContent = file.name;

      const reader = new FileReader();
      reader.onload = function(e) {
        excelBuffer = new Uint8Array(e.target.result);
        try {
          excelSheetInfoList = excelConverter.getSheetInfo(excelBuffer);
          updateExcelSheetSelect(excelSheetInfoList);
          document.getElementById('excelConfig').style.display = 'flex';
          onExcelSheetChange();
          showToast('已加载 ' + file.name);
        } catch (err) {
          showToast('解析文件失败：' + err.message, 'error');
        }
      };
      reader.readAsArrayBuffer(file);
    }

    function updateExcelSheetSelect(sheets) {
      const select = document.getElementById('excelSheetSelect');
      select.innerHTML = '';
      sheets.forEach(s => {
        const opt = document.createElement('option');
        opt.value = s.index;
        opt.textContent = s.name + ' (' + s.rowCount + '行 × ' + s.colCount + '列)';
        select.appendChild(opt);
      });
    }

    function onExcelSheetChange() {
      const idx = parseInt(document.getElementById('excelSheetSelect').value) || 0;
      const info = excelSheetInfoList[idx];
      if (!info) return;

      updateExcelPreview(info);
      updateGroupBySelect(info.headers);
    }

    function updateExcelPreview(sheetInfo) {
      const wrap = document.getElementById('excelPreviewWrap');
      const container = document.getElementById('excelPreview');
      wrap.style.display = 'block';

      const headers = sheetInfo.headers;
      const preview = sheetInfo.preview;

      let html = '<table><thead><tr>';
      headers.forEach(h => { html += '<th>' + escapeHtml(String(h)) + '</th>'; });
      html += '</tr></thead><tbody>';

      preview.forEach(row => {
        html += '<tr>';
        row.forEach(cell => { html += '<td>' + escapeHtml(String(cell ?? '')) + '</td>'; });
        html += '</tr>';
      });

      html += '</tbody></table>';
      container.innerHTML = html;
    }

    function updateGroupBySelect(headers) {
      const select = document.getElementById('excelGroupBy');
      select.innerHTML = '<option value="">请选择列</option>';
      headers.forEach(h => {
        const opt = document.createElement('option');
        opt.value = h;
        opt.textContent = h;
        select.appendChild(opt);
      });
    }

    function escapeHtml(str) {
      return str.replace(/&/g, '&amp;').replace(/</g, '&lt;').replace(/>/g, '&gt;');
    }

    function convertExcelToJson() {
      if (!excelBuffer) {
        showToast('请先上传 Excel 文件！', 'error');
        return;
      }

      const sheetIndex = parseInt(document.getElementById('excelSheetSelect').value) || 0;
      const headerRow = parseInt(document.getElementById('excelHeaderRow').value) || 0;
      const outputFormat = document.getElementById('excelOutputFormat').value;
      const groupByKey = document.getElementById('excelGroupBy').value;

      const options = {
        sheetIndex: sheetIndex,
        headerRow: headerRow,
        outputFormat: outputFormat,
        groupByKey: outputFormat === 'grouped' ? groupByKey : undefined,
      };

      try {
        const result = excelConverter.convert(excelBuffer, options);
        const json = JSON.stringify(result, null, 2);
        document.getElementById('excelOutput').value = json;
        showToast('转换成功！');
      } catch (err) {
        showToast('转换失败：' + err.message, 'error');
      }
    }

    const excelUpload = document.getElementById('excelUpload');
    const excelFileInput = document.getElementById('excelFileInput');

    excelUpload.addEventListener('click', () => excelFileInput.click());

    excelUpload.addEventListener('dragover', (e) => {
      e.preventDefault();
      excelUpload.classList.add('dragover');
    });

    excelUpload.addEventListener('dragleave', () => {
      excelUpload.classList.remove('dragover');
    });

    excelUpload.addEventListener('drop', (e) => {
      e.preventDefault();
      excelUpload.classList.remove('dragover');
      const file = e.dataTransfer.files[0];
      if (file) handleExcelFile(file);
    });

    excelFileInput.addEventListener('change', (e) => {
      const file = e.target.files[0];
      if (file) handleExcelFile(file);
    });

    document.getElementById('excelSheetSelect').addEventListener('change', onExcelSheetChange);

    document.getElementById('excelOutputFormat').addEventListener('change', (e) => {
      const groupRow = document.getElementById('excelGroupRow');
      if (e.target.value === 'grouped') {
        groupRow.classList.add('visible');
      } else {
        groupRow.classList.remove('visible');
      }
    });

    document.getElementById('excelConvertBtn').addEventListener('click', convertExcelToJson);

    document.getElementById('excelCopyBtn').addEventListener('click', async () => {
      const text = document.getElementById('excelOutput').value;
      if (!text) { showToast('没有内容可复制！', 'error'); return; }
      try {
        await navigator.clipboard.writeText(text);
        showToast('已复制到剪贴板！');
      } catch {
        showToast('复制失败！', 'error');
      }
    });

    document.getElementById('excelDownloadJsonBtn').addEventListener('click', () => {
      const text = document.getElementById('excelOutput').value;
      if (!text) { showToast('没有内容可下载！', 'error'); return; }
      const blob = new Blob([text], { type: 'application/json' });
      const url = URL.createObjectURL(blob);
      const a = document.createElement('a');
      a.href = url;
      a.download = 'output.json';
      document.body.appendChild(a);
      a.click();
      document.body.removeChild(a);
      URL.revokeObjectURL(url);
      showToast('JSON 下载成功！');
    });

    document.getElementById('excelDownloadMdBtn').addEventListener('click', () => {
      const text = document.getElementById('excelOutput').value;
      if (!text) { showToast('没有内容可下载！', 'error'); return; }
      try {
        const converter = new JsonToMarkdownConverter({ indent: 2, sort: false });
        const md = converter.convert(text);
        const blob = new Blob([md], { type: 'text/markdown' });
        const url = URL.createObjectURL(blob);
        const a = document.createElement('a');
        a.href = url;
        a.download = 'output.md';
        document.body.appendChild(a);
        a.click();
        document.body.removeChild(a);
        URL.revokeObjectURL(url);
        showToast('Markdown 下载成功！');
      } catch (err) {
        showToast('Markdown 转换失败：' + err.message, 'error');
      }
    });
  </script>
