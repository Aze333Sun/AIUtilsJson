<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>JSON to Markdown Converter</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
      background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
      min-height: 100vh;
      display: flex;
      flex-direction: column;
    }

    .header {
      background: rgba(0, 0, 0, 0.2);
      padding: 16px 24px;
      display: flex;
      justify-content: space-between;
      align-items: center;
      color: white;
    }

    .header h1 {
      font-size: 20px;
      font-weight: 600;
    }

    .toolbar {
      display: flex;
      gap: 12px;
      align-items: center;
    }

    .btn {
      padding: 8px 16px;
      border: none;
      border-radius: 8px;
      cursor: pointer;
      font-size: 14px;
      font-weight: 500;
      transition: all 0.2s;
    }

    .btn-primary {
      background: #4CAF50;
      color: white;
    }

    .btn-primary:hover {
      background: #45a049;
    }

    .btn-secondary {
      background: rgba(255, 255, 255, 0.2);
      color: white;
      border: 1px solid rgba(255, 255, 255, 0.3);
    }

    .btn-secondary:hover {
      background: rgba(255, 255, 255, 0.3);
    }

    .btn-warning {
      background: #ff9800;
      color: white;
    }

    .btn-warning:hover {
      background: #f57c00;
    }

    .main-content {
      flex: 1;
      display: flex;
      padding: 20px;
      gap: 20px;
      overflow: hidden;
    }

    .panel {
      flex: 1;
      display: flex;
      flex-direction: column;
      background: white;
      border-radius: 16px;
      box-shadow: 0 10px 40px rgba(0, 0, 0, 0.2);
      overflow: hidden;
    }

    .panel-header {
      padding: 12px 20px;
      background: #f5f5f5;
      border-bottom: 1px solid #eee;
      display: flex;
      justify-content: space-between;
      align-items: center;
    }

    .panel-header h2 {
      font-size: 14px;
      font-weight: 600;
      color: #333;
    }

    .panel-body {
      flex: 1;
      overflow: hidden;
      display: flex;
      flex-direction: column;
    }

    textarea {
      flex: 1;
      width: 100%;
      padding: 16px;
      border: none;
      resize: none;
      font-family: 'Consolas', 'Monaco', monospace;
      font-size: 14px;
      line-height: 1.6;
      background: #1e1e1e;
      color: #d4d4d4;
    }

    textarea:focus {
      outline: none;
    }

    textarea::placeholder {
      color: #666;
    }

    .output-area {
      flex: 1;
      padding: 16px;
      overflow-y: auto;
      font-family: 'Consolas', 'Monaco', monospace;
      font-size: 14px;
      line-height: 1.6;
      background: #fafafa;
      color: #333;
      white-space: pre-wrap;
      word-wrap: break-word;
    }

    .drop-zone {
      border: 2px dashed #ddd;
      border-radius: 8px;
      padding: 20px;
      text-align: center;
      color: #999;
      transition: all 0.3s;
      margin-bottom: 16px;
    }

    .drop-zone.dragover {
      border-color: #667eea;
      background: #f0f4ff;
      color: #667eea;
    }

    .status-bar {
      padding: 8px 16px;
      background: rgba(0, 0, 0, 0.1);
      font-size: 12px;
      color: white;
      display: flex;
      justify-content: space-between;
    }

    .template-select {
      padding: 6px 12px;
      border-radius: 6px;
      border: 1px solid rgba(255, 255, 255, 0.3);
      background: rgba(255, 255, 255, 0.1);
      color: white;
      font-size: 14px;
      cursor: pointer;
    }

    .template-select option {
      background: #333;
      color: white;
    }

    .toast {
      position: fixed;
      bottom: 40px;
      right: 20px;
      padding: 12px 24px;
      border-radius: 8px;
      color: white;
      font-size: 14px;
      opacity: 0;
      transform: translateY(20px);
      transition: all 0.3s;
      z-index: 1000;
    }

    .toast.show {
      opacity: 1;
      transform: translateY(0);
    }

    .toast.success {
      background: #4CAF50;
    }

    .toast.error {
      background: #f44336;
    }

    .checkbox-group {
      display: flex;
      gap: 16px;
      align-items: center;
    }

    .checkbox-group label {
      display: flex;
      align-items: center;
      gap: 6px;
      font-size: 12px;
      color: #666;
      cursor: pointer;
    }

    .checkbox-group input[type="checkbox"] {
      cursor: pointer;
    }

    .mode-selector {
      display: flex;
      gap: 8px;
      font-size: 12px;
    }

    .mode-selector label {
      display: flex;
      align-items: center;
      gap: 4px;
      cursor: pointer;
      padding: 4px 8px;
      border-radius: 4px;
      background: rgba(255, 255, 255, 0.1);
      color: white;
    }

    .mode-selector input[type="radio"] {
      cursor: pointer;
    }
  </style>
</head>
<body>
  <div class="header">
    <h1>JSON to Markdown Converter</h1>
    <div class="toolbar">
      <div class="mode-selector">
        <label><input type="radio" name="mode" value="normal" checked> Normal</label>
        <label><input type="radio" name="mode" value="chat"> Chat</label>
      </div>
      <button class="btn btn-secondary" id="copyBtn">Copy</button>
      <button class="btn btn-warning" id="exportBtn">Export</button>
      <button class="btn btn-secondary" id="clearBtn">Clear</button>
    </div>
  </div>

  <div class="main-content">
    <div class="panel">
      <div class="panel-header">
        <h2>JSON Input</h2>
        <span style="font-size: 12px; color: #999;">Drop JSON file here or paste JSON</span>
      </div>
      <div class="panel-body">
        <div class="drop-zone" id="dropZone">
          Drop JSON file here
        </div>
        <textarea id="jsonInput" placeholder='{"name": "Your JSON data here"}'></textarea>
      </div>
    </div>

    <div class="panel">
      <div class="panel-header">
        <h2>Markdown Output</h2>
        <div class="checkbox-group">
          <label><input type="checkbox" id="sortCheck"> Sort Keys</label>
          <span id="charCount" style="font-size: 12px; color: #999;">0 characters</span>
        </div>
      </div>
      <div class="panel-body">
        <div class="output-area" id="outputArea"></div>
      </div>
    </div>
  </div>

  <div class="status-bar">
    <span id="status">Ready</span>
    <span id="conversionTime">0ms</span>
  </div>

  <div class="toast" id="toast"></div>

  <script>
    class JsonToMarkdownConverter {
      constructor(options = {}) {
        this.indent = options.indent || 2;
        this.sort = options.sort || false;
      }

      sanitizeJson(input) {
        return input
          .replace(/\r/g, '')
          .replace(/\\(?![u"]) /g, '\\\\')
          .replace(/([^\\])"/g, '$1\\"');
      }

      processContent(content) {
        if (!content) return '';
        
        let result = content
          .replace(/\\n/g, '\n')
          .replace(/\\t/g, '\t')
          .replace(/\\"/g, '"')
          .replace(/\\'/g, "'");
        
        if (result.includes('\n```') || result.includes('```\n')) {
          return result;
        }
        
        const lines = result.split('\n');
        const hasLongLine = lines.some(line => line.length > 80);
        const hasCodePattern = /```[\s\S]*```/.test(result);
        
        if (hasCodePattern) {
          return result;
        }
        
        if (hasLongLine || lines.length > 5) {
          return `\`\`\`\n${result}\n\`\`\``;
        }
        
        return result;
      }

      convertChat(jsonString) {
        let data;
        try {
          data = JSON.parse(jsonString);
        } catch (error) {
          try {
            const sanitized = this.sanitizeJson(jsonString);
            data = JSON.parse(sanitized);
          } catch (sanitizeError) {
            throw new Error(`Invalid JSON: ${error.message}`);
          }
        }

        if (!data.messages || !Array.isArray(data.messages)) {
          throw new Error('Invalid chat format: missing or invalid messages array');
        }

        let result = '';
        data.messages.forEach((msg, index) => {
          const role = msg.role || 'unknown';
          const content = msg.content || '';
          const roleLabel = role === 'user' ? 'User' : 
                            role === 'assistant' ? 'Assistant' : 
                            role === 'system' ? 'System' : 
                            role.charAt(0).toUpperCase() + role.slice(1);
          
          const timestamp = msg.timestamp ? ` (${msg.timestamp})` : '';
          
          result += `## ${index + 1}. ${roleLabel}${timestamp}\n\n`;
          const processedContent = this.processContent(content);
          result += `${processedContent}\n\n---\n\n`;
        });
        
        return result.trim();
      }

      convert(jsonString) {
        let data;
        try {
          data = JSON.parse(jsonString);
        } catch (error) {
          try {
            const sanitized = this.sanitizeJson(jsonString);
            data = JSON.parse(sanitized);
          } catch (sanitizeError) {
            throw new Error(`Invalid JSON: ${error.message}`);
          }
        }
        return this.convertToMarkdown(data, 0);
      }

      convertToMarkdown(value, depth) {
        const indentStr = ' '.repeat(this.indent * depth);

        if (value === null) return 'null';
        if (value === undefined) return 'undefined';

        switch (typeof value) {
          case 'string':
            return this.convertString(value, depth);
          case 'number':
          case 'boolean':
            return String(value);
          case 'object':
            if (Array.isArray(value)) {
              return this.convertArray(value, depth);
            }
            return this.convertObject(value, depth);
          default:
            return String(value);
        }
      }

      convertString(value, depth) {
        if (this.isJsonString(value) || this.isCodeString(value)) {
          return `\n${' '.repeat(this.indent * depth)}\`\`\`json\n${value}\n${' '.repeat(this.indent * depth)}\`\`\``;
        }
        return `"${value}"`;
      }

      isJsonString(value) {
        try {
          JSON.parse(value);
          return true;
        } catch {
          return false;
        }
      }

      isCodeString(value) {
        const codePatterns = [
          /^(function|const|let|var|class|import|export)/,
          /^\s*\{.*\}\s*$/,
          /^\s*\[.*\]\s*$/
        ];
        return codePatterns.some(pattern => pattern.test(value.trim()));
      }

      convertArray(arr, depth) {
        if (arr.length === 0) return '[]';
        if (this.isTableData(arr)) return this.convertToTable(arr);

        const indentStr = ' '.repeat(this.indent * depth);
        let result = '\n';

        arr.forEach((item, index) => {
          const itemStr = this.convertToMarkdown(item, depth + 1);
          const isNested = typeof item === 'object' && item !== null;
          if (isNested && !Array.isArray(item)) {
            const title = `### ${index + 1}. ${Object.keys(item)[0] || 'Item'}`;
            result += `${indentStr}- ${title}\n`;
            const nestedContent = this.convertToMarkdown(item, depth + 1);
            result += nestedContent;
          } else {
            result += `${indentStr}- ${itemStr}\n`;
          }
        });

        return result;
      }

      isTableData(arr) {
        if (arr.length === 0) return false;
        if (!arr.every(item => typeof item === 'object' && item !== null && !Array.isArray(item))) {
          return false;
        }
        const keys = Object.keys(arr[0]);
        return arr.every(item => {
          const itemKeys = Object.keys(item);
          return itemKeys.length === keys.length && keys.every(key => itemKeys.includes(key));
        });
      }

      convertToTable(arr) {
        if (arr.length === 0) return '[]';
        const keys = Object.keys(arr[0]);
        const header = `| ${keys.join(' | ')} |`;
        const separator = `| ${keys.map(() => '---').join(' | ')} |`;

        const rows = arr.map(item => {
          const values = keys.map(key => {
            const value = item[key];
            if (typeof value === 'string' && value.length > 50) {
              return value.substring(0, 50) + '...';
            }
            return String(value);
          });
          return `| ${values.join(' | ')} |`;
        });

        return `\n${header}\n${separator}\n${rows.join('\n')}\n`;
      }

      convertObject(obj, depth) {
        const keys = Object.keys(obj);
        if (this.sort) keys.sort();

        const indentStr = ' '.repeat(this.indent * depth);
        let result = '';

        keys.forEach((key, index) => {
          const value = obj[key];
          const isLast = index === keys.length - 1;
          const titleLevel = Math.min(depth + 1, 6);
          const title = '#'.repeat(titleLevel) + ' ' + key;

          result += `\n${indentStr}${title}\n`;
          result += this.convertToMarkdown(value, depth + 1);

          if (!isLast && depth < 4) result += '\n';
        });

        return result;
      }
    }

    const jsonInput = document.getElementById('jsonInput');
    const outputArea = document.getElementById('outputArea');
    const dropZone = document.getElementById('dropZone');
    const copyBtn = document.getElementById('copyBtn');
    const exportBtn = document.getElementById('exportBtn');
    const clearBtn = document.getElementById('clearBtn');
    const sortCheck = document.getElementById('sortCheck');
    const status = document.getElementById('status');
    const charCount = document.getElementById('charCount');
    const conversionTime = document.getElementById('conversionTime');
    const toast = document.getElementById('toast');

    function showToast(message, type = 'success') {
      toast.textContent = message;
      toast.className = `toast ${type} show`;
      setTimeout(() => toast.classList.remove('show'), 3000);
    }

    function convertJson() {
      const jsonText = jsonInput.value.trim();
      if (!jsonText) {
        outputArea.textContent = '';
        charCount.textContent = '0 characters';
        conversionTime.textContent = '0ms';
        status.textContent = 'Ready';
        return;
      }

      status.textContent = 'Converting...';
      const startTime = Date.now();

      try {
        const mode = document.querySelector('input[name="mode"]:checked').value;
        const converter = new JsonToMarkdownConverter({
          indent: 2,
          sort: sortCheck.checked
        });
        
        let result;
        if (mode === 'chat') {
          result = converter.convertChat(jsonText);
        } else {
          result = converter.convert(jsonText);
        }
        
        outputArea.textContent = result;
        charCount.textContent = `${result.length} characters`;
        status.textContent = 'Success';
      } catch (error) {
        outputArea.textContent = `Error: ${error.message}`;
        status.textContent = 'Error';
        showToast('Invalid JSON!', 'error');
      }

      const endTime = Date.now();
      conversionTime.textContent = `${endTime - startTime}ms`;
    }

    jsonInput.addEventListener('input', convertJson);
    sortCheck.addEventListener('change', convertJson);
    document.querySelectorAll('input[name="mode"]').forEach(radio => {
      radio.addEventListener('change', convertJson);
    });

    dropZone.addEventListener('dragover', (e) => {
      e.preventDefault();
      dropZone.classList.add('dragover');
    });

    dropZone.addEventListener('dragleave', () => {
      dropZone.classList.remove('dragover');
    });

    dropZone.addEventListener('drop', (e) => {
      e.preventDefault();
      dropZone.classList.remove('dragover');

      const files = e.dataTransfer.files;
      if (files.length > 0) {
        const file = files[0];
        if (file.name.endsWith('.json')) {
          const reader = new FileReader();
          reader.onload = (event) => {
            jsonInput.value = event.target.result;
            convertJson();
            showToast(`Loaded ${file.name}`);
          };
          reader.readAsText(file);
        } else {
          showToast('Please drop a JSON file!', 'error');
        }
      }
    });

    copyBtn.addEventListener('click', async () => {
      const text = outputArea.textContent;
      if (!text) {
        showToast('Nothing to copy!', 'error');
        return;
      }

      try {
        await navigator.clipboard.writeText(text);
        showToast('Copied to clipboard!');
      } catch (error) {
        showToast('Copy failed!', 'error');
      }
    });

    exportBtn.addEventListener('click', () => {
      const text = outputArea.textContent;
      if (!text) {
        showToast('Nothing to export!', 'error');
        return;
      }

      const content = text;
      const blob = new Blob([content], { type: 'text/markdown' });
      const url = URL.createObjectURL(blob);
      const a = document.createElement('a');
      a.href = url;
      a.download = 'output.md';
      document.body.appendChild(a);
      a.click();
      document.body.removeChild(a);
      URL.revokeObjectURL(url);
      showToast('Exported successfully!');
    });

    clearBtn.addEventListener('click', () => {
      jsonInput.value = '';
      outputArea.textContent = '';
      charCount.textContent = '0 characters';
      conversionTime.textContent = '0ms';
      status.textContent = 'Ready';
      showToast('Cleared!');
    });

    jsonInput.value = `{
  "name": "Example Project",
  "version": "1.0.0",
  "description": "A sample JSON to demonstrate the converter",
  "author": "Developer",
  "tags": ["json", "markdown", "converter"],
  "config": {
    "indent": 2,
    "sort": true
  },
  "items": [
    {"id": 1, "name": "Item 1", "value": 100},
    {"id": 2, "name": "Item 2", "value": 200}
  ]
}`;
    convertJson();
  </script>
</body>
</html>
